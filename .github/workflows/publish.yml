name: Publish to npm

# Publishes this package to npm via npm Trusted Publishing (OIDC — no token).
# Triggers when a GitHub Release is published (tag it to match the version,
# e.g. v1.0.3), or manually via the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: no `registry-url:` here on purpose. It would write an .npmrc with
      # an empty `_authToken`, which shadows OIDC and makes `npm publish` fall
      # back to anonymous auth (→ 404). Without it, Trusted Publishing works.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted Publishing needs npm >= 11.5.1, newer than the bundled npm.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Versions
        run: node -v && npm -v

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      # Auth comes from the OIDC id-token; provenance is attached automatically.
      - name: Publish
        run: npm publish --access public
