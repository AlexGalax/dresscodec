name: Publish to npm

# Publishes to npm via Trusted Publishing (OIDC — no token). Triggers on a
# published GitHub Release, or manually via the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing needs npm >= 11.5.1 (newer than the bundled npm).
      - name: Update npm
        run: npm install -g npm@latest

      # Diagnostics: prints the npm version and the exact OIDC claims that npm's
      # Trusted Publisher config must match (repository / workflow file / ref).
      - name: Diagnostics
        run: |
          echo "node: $(node -v)"
          echo "npm:  $(npm -v)"
          node -e 'const v=require("child_process").execSync("npm -v").toString().trim();const[a,b,c]=v.split(".").map(Number);const ok=a>11||(a===11&&(b>5||(b===5&&c>=1)));console.log(ok?`npm ${v} supports Trusted Publishing`:`WARNING: npm ${v} is TOO OLD (need >= 11.5.1)`)'
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "::error::OIDC token unavailable — 'permissions: id-token: write' not effective"; exit 1
          fi
          CLAIMS=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | jq -r .value | cut -d. -f2)
          echo "----- OIDC claims npm must match against your Trusted Publisher config -----"
          echo "${CLAIMS}==" | tr '_-' '/+' | base64 -d 2>/dev/null \
            | jq '{repository, repository_owner, ref, job_workflow_ref, workflow_ref, environment}'
          echo "---------------------------------------------------------------------------"

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      # No token: auth comes from OIDC. Provenance is attached automatically.
      - name: Publish
        run: npm publish --access public
