name: Publish to npm
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # registry-url configures the registry in .npmrc so npm runs the OIDC
      # exchange for it. Do NOT set NODE_AUTH_TOKEN — with npm >= 11.5.1 the
      # empty _authToken line is ignored and Trusted Publishing (OIDC) is used.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Update npm
        run: npm install -g npm@latest
      - name: Diagnostics
        run: |
          echo "npm: $(npm -v)"
          echo "registry: $(npm config get registry)"
          echo "NODE_AUTH_TOKEN set? ${NODE_AUTH_TOKEN:+YES-THIS-IS-BAD}"
          echo "OIDC available? ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
      - run: npm install
      - run: npm test
      - run: npm publish
