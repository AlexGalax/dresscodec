name: Publish to npm
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update npm
        run: npm install -g npm@latest
      - name: Diagnostics
        run: |
          echo "npm: $(npm -v)"
          echo "registry: $(npm config get registry)"
          echo "NODE_AUTH_TOKEN set? ${NODE_AUTH_TOKEN:+YES-THIS-IS-BAD}"
      - run: npm install
      - run: npm test
      - run: npm publish --access public
