name: Publish to npm

# Publishes to npm via Trusted Publishing (OIDC — no token). Triggers on a
# published GitHub Release, or manually via the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing needs npm >= 11.5.1 (newer than the bundled npm).
      - name: Update npm
        run: npm install -g npm@latest

      # Fail loudly (with the actual versions) if the prerequisites are missing.
      - name: Check prerequisites
        run: |
          echo "node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "OIDC token URL present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          node -e 'const v=require("child_process").execSync("npm -v").toString().trim(); const [a,b,c]=v.split(".").map(Number); const ok=a>11||(a===11&&(b>5||(b===5&&c>=1))); if(!ok){console.error(`npm ${v} is too old for Trusted Publishing (need >= 11.5.1)`);process.exit(1)} console.log(`npm ${v} OK`)'
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL" || { echo "OIDC token not available — is 'permissions: id-token: write' set?"; exit 1; }

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      # No NODE_AUTH_TOKEN: auth comes from the OIDC id-token.
      - name: Publish
        run: npm publish --access public
